idea:
  title: Interpolation for Incongruent Concepts
  domain: theory
  hypothesis: 'Investigating interpolation between incongruent concepts may reveal
    different outcomes compared to interpolation between causally separable concepts,
    as emphasized in the linear representation hypothesis and information geometry
    literature.

    '
  background:
    description: 'The line of work on linear representation hypothesis and information
      geometry puts a strong emphasis on causally separable "concepts" and examines
      the curvature from interpolation either in the primal space or dual space. What
      about interpolation for incongruent concepts? What would the outcomes look like?

      '
